name: Nightly Publish

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
#VERSIONS
          - name: bullseye
            context: nightly/bullseye
            platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/386
            tags: |
              nightly-bullseye
          - name: slim-bullseye
            context: nightly/bullseye/slim
            platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/386
            tags: |
              nightly-bullseye-slim
          - name: bookworm
            context: nightly/bookworm
            platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/386,linux/ppc64le,linux/s390x
            tags: |
              nightly-bookworm
          - name: slim-bookworm
            context: nightly/bookworm/slim
            platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/386,linux/ppc64le,linux/s390x
            tags: |
              nightly-bookworm-slim
          - name: trixie
            context: nightly/trixie
            platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/386,linux/ppc64le,linux/s390x,linux/riscv64
            tags: |
              nightly-trixie
              nightly
              type=raw,value=nightly-{{date 'YYYY-MM-DD'}}
          - name: slim-trixie
            context: nightly/trixie/slim
            platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/386,linux/ppc64le,linux/s390x,linux/riscv64
            tags: |
              nightly-trixie-slim
              nightly-slim
              type=raw,value=nightly-slim-{{date 'YYYY-MM-DD'}}
          - name: alpine3.21
            context: nightly/alpine3.21
            platforms: linux/amd64,linux/arm64,linux/ppc64le
            tags: |
              nightly-alpine3.21
          - name: alpine3.22
            context: nightly/alpine3.22
            platforms: linux/amd64,linux/arm64,linux/ppc64le
            tags: |
              nightly-alpine3.22
          - name: alpine3.23
            context: nightly/alpine3.23
            platforms: linux/amd64,linux/arm64,linux/ppc64le
            tags: |
              nightly-alpine3.23
              nightly-alpine
              type=raw,value=nightly-alpine-{{date 'YYYY-MM-DD'}}
#VERSIONS
    name: ${{ matrix.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: rust-lang
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rustopsbot
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Compute nightly date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            rustlang/rust
            ghcr.io/rust-lang/rust
          tags: ${{ matrix.tags }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platforms }}
          build-args: |
            RUST_VERSION=nightly-${{ steps.date.outputs.date }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
